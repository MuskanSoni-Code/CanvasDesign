<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <canvas id="can"></canvas>
    <script>
      let canvas = document.getElementById("can");
      canvas.width = 500;
      canvas.height = 500;
      canvas.style.border = "2px solid red";
      let ctx = canvas.getContext("2d");
      ctx.fillStyle = "black";
      ctx.fillRect(0, 0, 500, 500);

      //line
      ctx.translate(250, 250);
      for (let i = 1; i <= 90; i++) {
        ctx.rotate(Math.PI / 25);
        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.lineTo(180, 0);
        ctx.strokeStyle = `hsl(${i * 7},100%,50%)`;
        ctx.lineWidth = 2;
        ctx.stroke();
      }

      //Circle
      ctx.beginPath();
      ctx.arc(5, 5, 40, 0, 2 * Math.PI);
      ctx.fillStyle = "white";
      ctx.fill();
    </script>
  </body>
</html>
