<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Card</title>
  </head>
  <body>
    <canvas id="can"></canvas>
    <script>
      let Canvas = document.getElementById("can");
      Canvas.height = 500;
      Canvas.width = 500;
      Canvas.style.border = "2px solid red";
      let ctx = Canvas.getContext("2d");
      ctx.fillStyle = "#0f192b";
      ctx.fillRect(0, 0, 500, 500);

      //Card
      ctx.fillStyle = "grey";
      ctx.roundRect(130, 150, 250, 150, 10);
      ctx.fill();
      //Card with border
      ctx.strokeStyle = "green";
      ctx.lineWidth = 2;
      ctx.shadowBlur = 20;
      ctx.shadowColor = "green";
      ctx.roundRect(130, 150, 250, 150, 10);
      ctx.stroke();

      //circle
      ctx.beginPath();
      ctx.arc(260, 200, 30, 0, 2 * Math.PI);
      ctx.fillStyle = "cyan";
      ctx.fill();
      //text
      ctx.font = "27px verdana";
      ctx.strokeStyle = "white";
      ctx.strokeText("Muskan Soni", 178, 270);
    </script>
  </body>
</html>
