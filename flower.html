      let canvas = document.getElementById("can");
      canvas.width = 400;
      canvas.height = 400;
      canvas.style.border = "2px solid black";

      let ctx = canvas.getContext("2d");

      // Background
      ctx.fillStyle = "#f0f0f0";
      ctx.fillRect(0, 0, 400, 400);

      // Face
      ctx.beginPath();
      ctx.arc(200, 200, 120, 0, 2 * Math.PI);
      ctx.fillStyle = "yellow";
      ctx.fill();
      ctx.stroke();

      // Left Eye
      ctx.beginPath();
      ctx.arc(160, 170, 15, 0, 2 * Math.PI);
      ctx.fillStyle = "black";
      ctx.fill();

      // Right Eye
      ctx.beginPath();
      ctx.arc(240, 170, 15, 0, 2 * Math.PI);
      ctx.fill();

      // Smile
      ctx.beginPath();
      ctx.arc(200, 210, 60, 0, Math.PI);
      ctx.lineWidth = 5;
      ctx.strokeStyle = "black";
      ctx.stroke();
    </script>
