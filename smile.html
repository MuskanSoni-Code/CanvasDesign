<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Smile</title>
  </head>
  <body>
    <canvas id="can"></canvas>
    <script>
      let Canvas = document.getElementById("can");
      Canvas.width = 450;
      Canvas.height = 450;
      Canvas.style.border = "2px solid red";
      Canvas.style.background = "grey";
      let ctx = Canvas.getContext("2d");
      ctx.beginPath();
      ctx.arc(220, 200, 120, 0, 2 * Math.PI);
      ctx.fillStyle = "Yellow";
      ctx.fill();
      ctx.stroke();

      //eye 1
      ctx.beginPath();
      ctx.arc(180, 170, 15, 0, 2 * Math.PI);
      ctx.fillStyle = "black";
      ctx.fill();

      //eye 2
      ctx.beginPath();
      ctx.arc(260, 170, 15, 0, 2 * Math.PI);
      ctx.fillStyle = "black";
      ctx.fill();

      //Mouth
      ctx.beginPath();
      ctx.arc(220, 210, 60, 0, Math.PI);
      ctx.strokeStyle = "black";
      ctx.lineWidth = 3;
      ctx.stroke();
    </script>
  </body>
</html>
